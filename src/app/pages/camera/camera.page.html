<ion-content [fullscreen]="true" class="text-white bg-slate-950">
  <!-- Immersive Fullscreen Video Layer -->
  <video #localVideo autoplay playsinline muted class="w-full h-full object-cover absolute inset-0 z-0"></video>

  <!-- Start Overlay (Visible when not streaming) -->
  <div *ngIf="!isStreaming" class="absolute inset-0 z-20 flex flex-col items-center justify-center bg-slate-950/80 backdrop-blur-md p-6 pointer-events-auto">
    <div class="mb-12 flex flex-col items-center text-center">
      <div class="w-16 h-16 bg-rose-600/20 rounded-3xl flex items-center justify-center mb-4 border border-rose-500/30">
        <ion-icon name="videocam" class="text-3xl text-rose-500"></ion-icon>
      </div>
      <h1 class="text-2xl font-black italic tracking-widest text-white">FSC <span class="text-rose-500">MOBILE</span></h1>
      <p class="text-[10px] text-white/50 font-bold uppercase tracking-[0.2em] mt-2">Remote Camera Source</p>
    </div>
    
    <!-- Device Selector -->
    <div class="w-full max-w-xs mb-10">
      <select [value]="selectedDeviceId()" (change)="onDeviceChange($event)" class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 text-xs font-bold text-center text-white focus:outline-none appearance-none">
        <option *ngFor="let device of devices()" [value]="device.deviceId" class="text-black">
          {{ device.label || 'Camera ' + (device.deviceId | slice:0:4) }}
        </option>
        <option *ngIf="devices().length === 0" disabled>No Cameras Found</option>
      </select>
    </div>

    <!-- Huge Start Button -->
    <button (click)="startStreaming()" class="w-36 h-36 bg-rose-600 rounded-full flex flex-col items-center justify-center shadow-[0_0_60px_rgba(225,29,72,0.4)] active:scale-95 transition-all border-4 border-rose-400/30">
      <span class="text-lg font-black uppercase tracking-widest">Start</span>
      <span class="text-[8px] uppercase font-bold text-rose-200 tracking-widest mt-1 opacity-80">{{ status.includes('Ready') ? 'Transmit' : status }}</span>
    </button>
    
    <!-- Status / Error -->
    <div *ngIf="errorName()" class="absolute bottom-10 inset-x-6 text-center">
      <p class="text-[10px] font-bold text-rose-400 bg-rose-950/50 p-4 rounded-xl border border-rose-500/20">{{ status }}</p>
    </div>
  </div>

  <!-- Live Mode UI (Visible when streaming) -->
  <div *ngIf="isStreaming" class="absolute inset-0 z-20 pointer-events-none">
    
    <!-- Top HUD -->
    <div class="absolute top-6 left-6 right-6 flex justify-between items-start pointer-events-auto">
      
      <!-- Live Badge -->
      <div class="flex items-center gap-2 bg-slate-950/60 backdrop-blur-xl border border-white/10 px-4 py-2 rounded-full shadow-2xl">
        <div class="w-2 h-2 bg-rose-500 rounded-full animate-pulse"></div>
        <span class="text-[10px] font-black uppercase tracking-widest text-white leading-loose pt-0.5">Live</span>
        <div class="w-px h-3 bg-white/20 mx-1"></div>
        <ion-icon name="radio-button-on" [class.text-emerald-400]="signalingStatus() === 'connected'" class="text-xs"></ion-icon>
      </div>

      <!-- Close Action -->
      <button (click)="stopStreaming()" class="w-12 h-12 bg-slate-950/60 backdrop-blur-xl rounded-full flex items-center justify-center border border-white/10 text-white hover:bg-rose-600 transition-colors shadow-2xl active:scale-90">
        <ion-icon name="close-outline" class="text-2xl"></ion-icon>
      </button>

    </div>

    <!-- Safe Area UI guidelines like camera viewfinder -->
    <div class="absolute inset-x-8 top-24 bottom-12 flex justify-between opacity-30 pointer-events-none">
      <div class="w-6 h-6 border-t-2 border-l-2 border-white"></div>
      <div class="w-6 h-6 border-t-2 border-r-2 border-white"></div>
    </div>
    <div class="absolute inset-x-8 top-24 bottom-12 flex justify-between items-end opacity-30 pointer-events-none">
      <div class="w-6 h-6 border-b-2 border-l-2 border-white"></div>
      <div class="w-6 h-6 border-b-2 border-r-2 border-white"></div>
    </div>

    <!-- Zoom Control HUD -->
    <div *ngIf="zoomSupported()" class="absolute bottom-6 left-12 right-12 flex items-center gap-4 pointer-events-auto bg-slate-950/60 backdrop-blur-md border border-white/10 px-5 py-3 rounded-full shadow-2xl">
      <ion-icon name="remove-outline" class="text-white/80 bg-white/10 rounded-full p-1 text-xl"></ion-icon>
      <input type="range" class="flex-1 w-full appearance-none bg-white/20 h-1.5 rounded-full outline-none accent-rose-500" [min]="zoomMin()" [max]="zoomMax()" [step]="zoomStep()" [value]="zoomValue()" (input)="onZoomChange($event)">
      <ion-icon name="add-outline" class="text-white/80 bg-white/10 rounded-full p-1 text-xl"></ion-icon>
    </div>
  </div>
</ion-content>
