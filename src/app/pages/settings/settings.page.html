<ion-content class="bg-[#1c2129] text-white font-sans overflow-hidden">
  <div class="h-screen flex flex-col bg-[#1c2129] overflow-hidden select-none">
    
    <!-- FSC Title Bar -->
    <header class="h-8 bg-[#2d333d] border-b border-black/40 flex items-center justify-between px-3 shrink-0">
      <div class="flex items-center gap-2">
        <ion-icon name="settings-outline" class="text-white/60 text-sm"></ion-icon>
        <span class="text-[11px] font-medium text-white/80">Settings</span>
      </div>
      <button (click)="close()" class="w-6 h-6 hover:bg-rose-600 flex items-center justify-center transition-all group">
        <ion-icon name="close-outline" class="text-sm text-white/40 group-hover:text-white"></ion-icon>
      </button>
    </header>

    <div class="flex-1 flex overflow-hidden">
      <!-- FSC Sidebar -->
      <aside class="w-44 bg-[#14171d] border-r border-black/40 py-2 shrink-0 flex flex-col">
        <nav class="flex-1 px-1.5 space-y-0.5 overflow-y-auto">
          <button *ngFor="let tab of [
            { id: 'general', label: 'General', icon: 'settings-outline' },
            { id: 'appearance', label: 'Appearance', icon: 'color-palette-outline' },
            { id: 'stream', label: 'Stream', icon: 'radio-outline' },
            { id: 'output', label: 'Output', icon: 'build-outline' },
            { id: 'audio', label: 'Audio', icon: 'volume-high-outline' },
            { id: 'video', label: 'Video', icon: 'tv-outline' },
            { id: 'hotkeys', label: 'Hotkeys', icon: 'keyboard-outline' },
            { id: 'accessibility', label: 'Accessibility', icon: 'accessibility-outline' },
            { id: 'advanced', label: 'Advanced', icon: 'layers-outline' }
          ]"
          (click)="activeTab = tab.id"
          [class.bg-[#3b82f6]]="activeTab === tab.id"
          [class.text-white]="activeTab === tab.id"
          [class.text-white/60]="activeTab !== tab.id"
          class="w-full flex items-center gap-3 px-3 py-2 rounded-[2px] text-[11px] font-medium transition-all hover:bg-white/5 group"
          >
            <ion-icon [name]="tab.icon" class="text-sm" [class.text-white]="activeTab === tab.id"></ion-icon>
            {{ tab.label }}
          </button>
        </nav>
      </aside>

      <!-- Main Config Pane -->
      <main class="flex-1 bg-[#1c2129] flex flex-col min-w-0">
        <div class="flex-1 overflow-y-auto p-6">
          
          <!-- General Section -->
          <div *ngIf="activeTab === 'general'" class="space-y-6 animate-in fade-in duration-200">
            <section class="space-y-4">
              <div class="flex items-center gap-2 mb-2 pb-1 border-b border-white/5">
                <span class="text-[11px] font-black uppercase tracking-widest text-white/30">General</span>
              </div>
              
              <div class="flex items-center gap-6">
                <label class="text-[11px] font-medium text-white/80 w-32 shrink-0">Language</label>
                <select class="flex-1 max-w-sm bg-[#2d333d] border border-white/10 rounded-sm py-1 px-2 text-[11px] text-white/90 outline-none focus:border-blue-500">
                  <option selected>English</option>
                  <option>Urdu</option>
                </select>
              </div>

              <div class="space-y-2 pt-2">
                <label class="flex items-center gap-3 cursor-pointer group">
                  <input type="checkbox" class="w-3.5 h-3.5 bg-[#2d333d] border border-white/20 rounded-sm checked:bg-blue-600 appearance-none transition-all">
                  <span class="text-[11px] text-white/80 group-hover:text-white transition-all">Open stats dialog on startup</span>
                </label>
                <label class="flex items-center gap-3 cursor-pointer group">
                  <input type="checkbox" checked class="w-3.5 h-3.5 bg-[#2d333d] border border-white/20 rounded-sm checked:bg-blue-600 appearance-none transition-all">
                  <span class="text-[11px] text-white/80 group-hover:text-white transition-all">Automatically check for updates on startup</span>
                </label>
              </div>
            </section>

            <section class="space-y-4 pt-4">
              <div class="flex items-center gap-2 mb-2 pb-1 border-b border-white/5">
                <span class="text-[11px] font-black uppercase tracking-widest text-white/30">Output</span>
              </div>
              <label class="flex items-center gap-3 cursor-pointer group">
                <input type="checkbox" class="w-3.5 h-3.5 bg-[#2d333d] border border-white/20 rounded-sm checked:bg-blue-600 appearance-none transition-all">
                <span class="text-[11px] text-white/80 group-hover:text-white transition-all">Show confirmation dialog when starting streams</span>
              </label>
            </section>
          </div>

          <!-- Stream Section -->
          <div *ngIf="activeTab === 'stream'" class="space-y-6 animate-in fade-in duration-200">
            <section class="space-y-4">
              <div class="flex items-center gap-2 mb-2 pb-1 border-b border-white/5">
                <span class="text-[11px] font-black uppercase tracking-widest text-white/30">Service</span>
              </div>
              
              <div class="flex items-center gap-6">
                <label class="text-[11px] font-medium text-white/80 w-32 shrink-0">Server URL</label>
                <input [(ngModel)]="rtmpUrl" class="flex-1 max-w-sm bg-[#2d333d] border border-white/10 rounded-sm py-1 px-3 text-[11px] text-white/90 outline-none focus:border-blue-500 font-mono shadow-inner">
              </div>

              <div class="flex items-center gap-6">
                <label class="text-[11px] font-medium text-white/80 w-32 shrink-0">Stream Key</label>
                <input [(ngModel)]="rtmpKey" type="password" class="flex-1 max-w-sm bg-[#2d333d] border border-white/10 rounded-sm py-1 px-3 text-[11px] text-white/90 outline-none focus:border-blue-500 font-mono shadow-inner" placeholder="Show to check">
              </div>
            </section>

            <section class="space-y-4 pt-6">
              <div class="flex items-center gap-2 mb-2 pb-1 border-b border-blue-500/30">
                <span class="text-[11px] font-black uppercase tracking-widest text-blue-400">Broadcast Overlays</span>
              </div>
              
              <div class="flex flex-col gap-3 bg-blue-900/10 p-4 rounded border border-blue-500/10">
                <label class="flex items-center gap-3 cursor-pointer group">
                  <input type="checkbox" [(ngModel)]="showOverlay" class="w-3.5 h-3.5 bg-[#2d333d] border border-white/20 rounded-sm checked:bg-blue-600 appearance-none transition-all">
                  <span class="text-[11px] font-bold text-white/90">Enable HTML Overlays</span>
                </label>
                
                <label class="flex items-center gap-3 cursor-pointer group">
                  <input type="checkbox" [checked]="settingsService.showPitchGraph()" (change)="settingsService.showPitchGraph.set(!settingsService.showPitchGraph())" class="w-3.5 h-3.5 bg-[#2d333d] border border-white/20 rounded-sm checked:bg-blue-600 appearance-none transition-all">
                  <span class="text-[11px] text-white/80">Show 3D Pitch Graph Overlay</span>
                </label>

                <label class="flex items-center gap-3 cursor-pointer group">
                  <input type="checkbox" [checked]="settingsService.showManualGrid()" (change)="settingsService.showManualGrid.set(!settingsService.showManualGrid())" class="w-3.5 h-3.5 bg-[#2d333d] border border-white/20 rounded-sm checked:bg-blue-600 appearance-none transition-all">
                  <span class="text-[11px] text-white/80">Show Manual Adjustment Grid</span>
                </label>
              </div>
            </section>
          </div>

          <!-- Video Section -->
          <div *ngIf="activeTab === 'video'" class="space-y-6 animate-in fade-in duration-200">
             <section class="space-y-4">
              <div class="flex items-center gap-2 mb-2 pb-1 border-b border-white/5">
                <span class="text-[11px] font-black uppercase tracking-widest text-white/30">Resolution Settings</span>
              </div>
              
              <div class="flex items-center gap-6">
                <label class="text-[11px] font-medium text-white/80 w-44 shrink-0">Base (Canvas) Resolution</label>
                <select class="flex-1 max-w-xs bg-[#2d333d] border border-white/10 rounded-sm py-1 px-2 text-[11px] text-white/90 outline-none focus:border-blue-500">
                  <option selected>1920x1080 (16:9)</option>
                  <option>1280x720 (16:9)</option>
                </select>
              </div>

              <div class="flex items-center gap-6">
                <label class="text-[11px] font-medium text-white/80 w-44 shrink-0">Output (Scaled) Resolution</label>
                <select class="flex-1 max-w-xs bg-[#2d333d] border border-white/10 rounded-sm py-1 px-2 text-[11px] text-white/90 outline-none focus:border-blue-500">
                  <option>1920x1080 (16:9)</option>
                  <option selected>1280x720 (16:9)</option>
                </select>
              </div>

              <div class="flex items-center gap-6">
                <label class="text-[11px] font-medium text-white/80 w-44 shrink-0">Common FPS Values</label>
                <select class="flex-1 max-w-xs bg-[#2d333d] border border-white/10 rounded-sm py-1 px-2 text-[11px] text-white/90 outline-none focus:border-blue-500">
                  <option>60</option>
                  <option selected>30</option>
                  <option>24</option>
                </select>
              </div>
            </section>
          </div>

          <!-- Placeholder for other tabs -->
          <div *ngIf="activeTab !== 'general' && activeTab !== 'stream' && activeTab !== 'video'" class="flex flex-col items-center justify-center h-full text-white/20 uppercase tracking-widest font-black text-xs">
            <ion-icon [name]="activeTab === 'hotkeys' ? 'keyboard-outline' : 'settings-outline'" class="text-4xl mb-2"></ion-icon>
            {{ activeTab }} Settings
          </div>

        </div>

        <!-- FSC Bottom Bar -->
        <footer class="h-10 bg-[#2d333d] border-t border-black/40 flex items-center justify-end px-3 gap-2 shrink-0">
          <button (click)="save()" class="px-5 py-0.5 bg-[#3b82f6] text-white text-[11px] font-medium rounded-[2px] transition-all hover:bg-blue-500 active:scale-95 shadow-sm">OK</button>
          <button (click)="close()" class="px-5 py-0.5 bg-[#4a5568] text-white text-[11px] font-medium rounded-[2px] transition-all hover:bg-slate-600 active:scale-95 shadow-sm">Cancel</button>
          <button (click)="save()" class="px-5 py-0.5 bg-[#4a5568] text-white text-[11px] font-medium rounded-[2px] transition-all hover:bg-slate-600 active:scale-95 shadow-sm opacity-50 cursor-not-allowed">Apply</button>
        </footer>
      </main>
    </div>

  </div>
</ion-content>
